openapi: 3.0.0
info:
  title: Cinema Friend API
  version: 1.0.0
paths:
  /api/v1/movies:
    get:
      summary: Получить список фильмов
      responses:
        '200':
          description: Успех
  /api/v1/book:
    post:
      summary: Забронировать место
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId: { type: string }
                row: { type: integer }
                seat: { type: integer }
      responses:
        '201':
          description: Бронь создана
        '400':
          description: Место занято